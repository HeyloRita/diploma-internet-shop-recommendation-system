name: internetshop

services:
  postgres:
    image: postgres:16-alpine
    container_name: internetshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: internetshop
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d internetshop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
